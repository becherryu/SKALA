server:
    port: 8080

management:
    endpoint:
        health:
            show-details: always

    endpoints:
        web:
            exposure:
                include: health, info, metrics

spring:
    datasource:
        url: jdbc:h2:mem:skala-stock
        driver-class-name: org.h2.Driver
        username: sa
        password:
    jpa:
        hibernate:
            ddl-auto: update
    h2:
        console:
            enabled: true

logging:
    level:
        root: INFO # 전체 로그 레벨 설정
        '[com.skala.basic]': DEBUG # com.skala.basic의 로그 레벨을 DEBUG로 설정
