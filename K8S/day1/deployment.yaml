apiVersion: apps/v1
kind: Deployment
metadata:
    name: sk3024-maintq-fe
    namespace: skala3-ai1
spec:
    replicas: 1
    selector:
        matchLabels:
            app: sk3024-maintq-fe
    template:
        metadata:
            labels:
                app: sk3024-maintq-fe
        spec:
            imagePullSecrets:
                - name: harbor-pull-secret
            containers:
                - name: sk3024-maintq-fe
                  image: amdp-registry.skala-ai.com/skala26a-ai1/a3024:latest
                  ports:
                      - containerPort: 8001
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '128Mi'
                      limits:
                          cpu: '500m'
                          memory: '512Mi'
