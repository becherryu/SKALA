apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
    name: build-and-push
spec:
    params:
        - name: image-url
          type: string
        - name: dockerfile-path
          type: string
          default: "./Dockerfile"
    workspaces:
        - name: source
    tasks:
        - name: build-push
          taskRef:
              name: kaniko
          params:
              - name: IMAGE
                value: $(params.image-url)
              - name: DOCKERFILE
                value: $(params.dockerfile-path)
          workspaces:
              - name: source
                workspace: source
