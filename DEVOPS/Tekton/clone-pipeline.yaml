apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
    name: clone-and-build
spec:
    params:
        - name: repo-url
          type: string
        - name: revision
          type: string
          default: main
    workspaces:
        - name: shared-workspace
    tasks:
        - name: fetch-source
          taskRef:
              name: git-clone
          params:
              - name: url
                value: $(params.repo-url)
              - name: revision
                value: $(params.revision)
          workspaces:
              - name: output
                workspace: shared-workspace
